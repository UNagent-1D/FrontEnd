server {
    listen 80;
    server_name localhost;

    # Root directory for the static SPA export (Next.js distDir: 'dist')
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;

    # ------------------------------------------------------------------
    # Common proxy directives. NOTE (k8s): proxy_pass targets are static
    # Service names (no `set $var` indirection and no `resolver`), so nginx
    # resolves them once at startup via the pod's CoreDNS. That is correct in
    # Kubernetes because Service ClusterIPs are stable for the life of the
    # Service even as backing pods churn — unlike Docker, where the old config
    # needed `resolver 127.0.0.11` to re-resolve container IPs.
    # ------------------------------------------------------------------
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    # ------------------------------------------------------------------
    # API reverse-proxy. Order/specificity matters: exact (=) and longest
    # ^~ prefix win, so user-auth's /auth/* specifics beat the tenant /auth/
    # catch-all. Mirrors cloudflare-worker/src/index.ts.
    # ------------------------------------------------------------------

    # chat-orch — SSE stream (must not buffer; long-lived).
    location ^~ /v1/chat/stream {
        proxy_pass http://chat-orch:3000;
        proxy_buffering           off;
        proxy_cache               off;
        proxy_read_timeout        24h;
        proxy_send_timeout        24h;
        chunked_transfer_encoding off;
    }

    # chat-orch — POST /v1/chat, /v1/feedback, etc.
    location ^~ /v1/ {
        proxy_pass http://chat-orch:3000;
    }

    # user-auth — OTP login endpoints (must precede the tenant /auth/ catch-all).
    location = /auth/request-code { proxy_pass http://user-auth:8080; }
    location = /auth/verify-code  { proxy_pass http://user-auth:8080; }
    location = /auth/resend-code  { proxy_pass http://user-auth:8080; }
    location ^~ /auth/users       { proxy_pass http://user-auth:8080; }

    # Tenant — password login + remaining /auth/* .
    location ^~ /auth/ {
        proxy_pass http://tenant:8080;
    }

    # Tenant — admin + per-tenant CRUD, users, internal auth, tool registry.
    location ^~ /api/admin/        { proxy_pass http://tenant:8080; }
    location ^~ /api/v1/tenants/   { proxy_pass http://tenant:8080; }
    location ^~ /api/v1/users      { proxy_pass http://tenant:8080; }
    location ^~ /api/v1/auth/      { proxy_pass http://tenant:8080; }
    location ^~ /api/v1/tool-registry { proxy_pass http://tenant:8080; }

    # conversation-chat — sessions + escalations. No trailing slash on the
    # prefixes so the bare paths (backend registers POST /api/v1/sessions and
    # /api/v1/escalations without a trailing slash) match too.
    location ^~ /api/v1/sessions     { proxy_pass http://conversation-chat:8082; }
    location ^~ /api/v1/escalations  { proxy_pass http://conversation-chat:8082; }

    # Compliance — KPI cards + timeseries.
    location ^~ /stats/ {
        proxy_pass http://compliance:8091;
    }

    # ------------------------------------------------------------------
    # SPA fallback — anything else falls through to the static export.
    # ------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached (it maps to content-hashed chunks).
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Hashed assets are immutable.
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
