server {
    listen 80;
    server_name localhost;

    # Root directory for the static files
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;

    # This is the crucial part for Single Page Applications (SPAs).
    # It ensures that any request that doesn't match a static file
    # is redirected to index.html, allowing the client-side router
    # (React Router) to handle the routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached — it's the map to the
    # content-hashed asset chunks, which change on every deploy.
    # If the browser caches an old index.html it will keep asking
    # for deleted chunk hashes and the app will render stale UI.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Hashed assets (Vite emits `name-<hash>.js`) are immutable:
    # the filename itself changes when the content changes, so the
    # browser can cache them forever.
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
