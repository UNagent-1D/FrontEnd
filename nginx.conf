server {
    listen 80;
    server_name localhost;

    # Docker's embedded DNS. Pairs with the `set $upstream_* ...` lines below
    # so nginx re-resolves upstream container IPs at request time instead of
    # caching once at startup — survives a `docker compose restart <svc>`.
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    # Root directory for the static SPA assets
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;

    # ------------------------------------------------------------------
    # Common proxy directives — inherited by every `location` that calls
    # `proxy_pass` below. SSE block overrides buffering + timeout.
    # ------------------------------------------------------------------
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    # ------------------------------------------------------------------
    # API reverse-proxy — browser hits this nginx as a single origin,
    # we fan out to backend services on the internal Docker network.
    # Order matters: longest prefix wins under `^~`.
    # ------------------------------------------------------------------

    # chat-orch — SSE stream. Must NOT buffer (clients need token-by-token
    # delivery) and must hold the connection open for the lifetime of a turn.
    location ^~ /v1/chat/stream {
        set $upstream_orch chat-orch:3000;
        proxy_pass http://$upstream_orch;
        proxy_buffering           off;
        proxy_cache               off;
        proxy_read_timeout        24h;
        proxy_send_timeout        24h;
        chunked_transfer_encoding off;
    }

    # chat-orch — POST /v1/chat, /v1/feedback (and anything else under /v1/)
    location ^~ /v1/ {
        set $upstream_orch chat-orch:3000;
        proxy_pass http://$upstream_orch;
    }

    # Tenant — login
    location ^~ /auth/ {
        set $upstream_tenant tenant:8080;
        proxy_pass http://$upstream_tenant;
    }

    # Tenant — app-admin CRUD
    location ^~ /api/admin/ {
        set $upstream_tenant tenant:8080;
        proxy_pass http://$upstream_tenant;
    }

    # Tenant — per-tenant CRUD (users, data-sources). Longest-prefix means
    # this wins over /api/v1/sessions/ below only for paths starting with
    # /api/v1/tenants/, exactly what we want.
    location ^~ /api/v1/tenants/ {
        set $upstream_tenant tenant:8080;
        proxy_pass http://$upstream_tenant;
    }

    # conversation-chat — sessions API (the chatClient base is /api/v1)
    location ^~ /api/v1/sessions/ {
        set $upstream_chat conversation-chat:8082;
        proxy_pass http://$upstream_chat;
    }

    # Compliance — KPI cards + timeseries chart on Analytics page
    location ^~ /stats/ {
        set $upstream_compliance compliance:8091;
        proxy_pass http://$upstream_compliance;
    }

    # ------------------------------------------------------------------
    # SPA fallback — anything that didn't match the API proxies above
    # falls through to React Router via index.html.
    # ------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached — it's the map to the
    # content-hashed asset chunks, which change on every deploy.
    # If the browser caches an old index.html it will keep asking
    # for deleted chunk hashes and the app will render stale UI.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Hashed assets (Vite emits `name-<hash>.js`) are immutable:
    # the filename itself changes when the content changes, so the
    # browser can cache them forever.
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
